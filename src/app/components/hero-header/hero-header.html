<section class="hero">
  <div>
    <p class="eyebrow">Euchre Tables</p>
    <div class="brand-lockup">
      <div class="brand-mark" aria-hidden="true">
        <span>J</span>
      </div>

      <h1>BowerHouse</h1>
    </div>

    <p class="subtitle">Create a table, invite friends, or sit down at a public game.</p>

    <button
      *ngIf="canInstall"
      type="button"
      class="install-button"
      (click)="installRequested.emit()"
    >
      Install BowerHouse
    </button>
  </div>
</section>
