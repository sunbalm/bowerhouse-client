<main class="app-shell">
  <app-connection-banners
    [reconnectAttempting]="reconnectAttempting"
    [isSocketConnected]="isSocketConnected"
  ></app-connection-banners>

  <app-game-panels
    [room]="currentRoom"
    [game]="currentGame"
    [activePanel]="activeGamePanel"
    [showTableLog]="showTableLog"
    [reactions]="reactions"
    [mySeatLabel]="mySeatLabel"
    (panelToggled)="toggleGamePanel($event)"
    (panelClosed)="closeGamePanel()"
    (settingsOpened)="openSettings()"
    (roomCodeCopied)="copyRoomCode()"
    (inviteCopied)="copyInviteText()"
    (rulesOpened)="openRules()"
    (reactionSent)="sendReaction($event)"
  ></app-game-panels>

  <app-hero-header
    *ngIf="!currentGame"
    [canInstall]="canInstall"
    (installRequested)="installApp()"
  ></app-hero-header>

  <app-home-view
    *ngIf="!currentRoom"
    [playerName]="playerName"
    [publicRooms]="publicRooms"
    (playerNameChange)="saveName($event)"
    (createGameRequested)="openCreateGame()"
    (joinPrivateRequested)="openJoinPrivate()"
    (publicRoomSelected)="joinPublicRoom($event)"
  ></app-home-view>

  <app-room-lobby
    *ngIf="currentRoom && !currentGame"
    [room]="currentRoom"
    [session]="currentSession"
    [isHost]="isHost"
    [canStartGame]="canStartGame"
    [statusMessage]="gameStatusMessage"
    (codeCopied)="copyRoomCode()"
    (inviteCopied)="copyInviteText()"
    (gameStarted)="startGame()"
    (tableLeft)="leaveLocalRoom()"
  ></app-room-lobby>

  <app-game-view
    *ngIf="currentRoom && currentGame"
    [currentGame]="currentGame"
    [currentRoom]="currentRoom"
    [currentSession]="currentSession"
    [actionPending]="actionPending"
    [isMyTurn]="isMyTurn"
    [isTwoPlayerDealerTurn]="isTwoPlayerDealerTurn"
    [availableTrumpSuits]="availableTrumpSuits"
    [canDealerPassNaming]="canDealerPassNaming"
    [turnPercentRemaining]="turnPercentRemaining"
    [isHost]="isHost"
    [nextHandSecondsRemaining]="nextHandSecondsRemaining"
    (rematchRequested)="rematch()"
    (homeReturned)="returnHome()"
    (twoPlayerTrumpNamed)="twoPlayerNameTrump($event)"
    (twoPlayerNamingPassed)="twoPlayerPassNaming()"
    (orderedUp)="orderUp()"
    (orderingPassed)="passOrdering()"
    (trumpNamed)="nameTrump($event)"
    (namingPassed)="passNaming()"
    (twoPlayerTableCardPlayed)="twoPlayerPlayTableCard($event.card, $event.slotIndex)"
    (dealerDiscarded)="discardCard($event)"
    (cardPlayed)="playCard($event)"
    (twoPlayerHandCardPlayed)="twoPlayerPlayHandCard($event)"
  ></app-game-view>

  <app-feedback-layer
    [errorMessage]="errorMessage"
    [successMessage]="successMessage"
    [connectionStatus]="connectionStatus"
    [latestReaction]="latestReaction"
    [autoActionMessage]="autoActionMessage"
  ></app-feedback-layer>

  <app-settings-modal
    [open]="showSettings"
    [hapticsEnabled]="hapticsEnabled"
    [showTableLog]="showTableLog"
    [canInstall]="canInstall"
    [showIosInstallHint]="showIosInstallHint"
    (closed)="closeSettings()"
    (hapticsToggled)="toggleHaptics()"
    (tableLogToggled)="toggleTableLog()"
    (installRequested)="installApp()"
  ></app-settings-modal>

  <app-create-game-modal
    [open]="showCreateGame"
    [(selectedMode)]="selectedMode"
    [(tableName)]="tableName"
    [(privatePassword)]="privatePassword"
    [(timerSeconds)]="timerSeconds"
    [(stickTheDealer)]="stickTheDealer"
    [(canadianLoner)]="canadianLoner"
    [privacyLabel]="createGamePrivacyLabel"
    [formReady]="createFormReady"
    (closed)="closeModals()"
    (timerBlurred)="normalizeTimer()"
    (createRequested)="createGame()"
  ></app-create-game-modal>

  <app-join-private-modal
    [open]="showJoinPrivate"
    [(joinRoomCode)]="joinRoomCode"
    [(joinPassword)]="joinPassword"
    [formReady]="joinPrivateFormReady"
    (closed)="closeModals()"
    (rulesRequested)="openRules()"
    (joinRequested)="joinPrivateGame()"
  ></app-join-private-modal>

  <app-rules-modal [open]="showRules" (closed)="closeRules()"></app-rules-modal>
</main>
